interface:
  display_name: "Debug AI Writing"
  short_description: "按场景、文体、叙事规则和整篇覆盖系统调试中文写作质量"
  default_prompt: "Use $debug-aiwriting to diagnose and rewrite this Chinese draft in its actual genre, preserving facts and scope; for narrative work also preserve POV, character knowledge, causality, and earned interiority, then verify voice, evidence, endings, and full-artifact coverage."

